<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lijkwade van Turijn - Reveal</title>
    <style>
        body {
            margin: 0; padding: 0; background-color: #030303; height: 100vh;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            font-family: 'Georgia', serif; overflow: hidden; color: #d4c4a8;
        }

        /* --- START SCHERM --- */
        #start-scherm {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: #000; z-index: 500; display: flex; flex-direction: column;
            justify-content: center; align-items: center; transition: opacity 1s;
        }
        #start-scherm.hidden { opacity: 0; visibility: hidden; pointer-events: none; }
        
        .pulse-tekst {
            border: 1px solid rgba(212, 196, 168, 0.5); color: #d4c4a8; padding: 15px 40px;
            font-family: 'Segoe UI', sans-serif; font-size: 20px; text-transform: uppercase;
            letter-spacing: 2px; cursor: pointer; animation: pulse 2s infinite; border-radius: 4px;
        }
        @keyframes pulse { 0%, 100% { opacity: 0.6; } 50% { opacity: 1; box-shadow: 0 0 15px rgba(212, 196, 168, 0.2); } }

        /* --- DE SCREENSAVER --- */
        .container {
            position: relative; width: 100vw; height: 100vh;
            display: flex; justify-content: center; align-items: center;
        }

        .wade-img {
            height: 90vh; 
            max-width: 90vw;
            object-fit: contain;
            opacity: 1; /* Opacity op 1 voor betere zichtbaarheid van eigen foto */
            transition: opacity 2s ease-in-out; /* Boterzachte overgang bij wissel */
        }

        /* Tekst overlay */
        .tekst-overlay {
            position: absolute; bottom: 8%; text-align: center; letter-spacing: 3px;
            transition: opacity 2s ease-in-out;
            background: radial-gradient(circle, rgba(0,0,0,0.9) 0%, rgba(0,0,0,0) 70%);
            padding: 20px 60px;
        }

        h1 { font-size: 34px; font-weight: normal; text-transform: uppercase; margin-bottom: 5px; color: #fff; }
        p { font-size: 20px; font-style: italic; color: #aaa; margin-top: 0; }
    </style>
</head>
<body>

    

    <div class="container">
        <img id="shroud" class="wade-img" src="ShroudFotoP.png" alt="Gezicht op de Lijkwade">
        
        <div class="tekst-overlay" id="tekst">
            <h1 id="hoofdtekst">De Lijkwade van Turijn</h1>
            <p id="subtekst">Wat we zien met het blote oog...</p>
        </div>
    </div>

    <script>
        const shroud = document.getElementById('shroud');
        const tekst = document.getElementById('tekst');
        const hoofdtekst = document.getElementById('hoofdtekst');
        const subtekst = document.getElementById('subtekst');
        const startScherm = document.getElementById('start-scherm');

        let isNegative = false;

        function toggleNegative() {
            tekst.style.opacity = 0; // Tekst wegfaden
            shroud.style.opacity = 0; // Afbeelding wegfaden

            setTimeout(() => {
                isNegative = !isNegative;
                
                // Wissel naar de juiste afbeelding
                if (isNegative) {
                    shroud.src = "ShroudFotoN.png"; // Jouw ingevoegde negatief-afbeelding
                    hoofdtekst.innerText = "Het Fotografisch Negatief";
                    subtekst.innerText = "...onthult het ware gezicht (Ontdekt in 1898)";
                } else {
                    shroud.src = "ShroudFotoP.png"; // Jouw normale afbeelding
                    hoofdtekst.innerText = "De Lijkwade van Turijn";
                    subtekst.innerText = "Wat we zien met het blote oog...";
                }

                tekst.style.opacity = 1; // Tekst terugvloeien
                shroud.style.opacity = 1; // Nieuwe afbeelding terugvloeien
            }, 2000); 
        }

        function startScreensaver() {
            startScherm.classList.add('hidden');
            setTimeout(() => {
                toggleNegative();
                setInterval(toggleNegative, 12000); // Elke 10 sec wisselen voor rustig effect
            }, 2000);
        }
    </script>
</body>
</html>
